<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Переводчик Seedance 2.0</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0ede8;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: white;
            max-width: 550px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            padding: 24px 20px 28px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 6px 0;
        }
        .sub {
            color: #6b5b4e;
            font-size: 13px;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5ddd4;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 500;
            font-size: 13px;
            color: #4a3a2c;
            display: block;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #d4c9be;
            border-radius: 20px;
            background: white;
            outline: none;
            font-family: inherit;
        }
        input:focus {
            border-color: #b97f3a;
        }
        .result {
            background: #f7f2ea;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0 12px;
        }
        .result-label {
            font-size: 11px;
            font-weight: 600;
            color: #a07d58;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .translation {
            font-size: 22px;
            font-weight: 600;
            word-break: break-word;
            color: #2c241a;
            line-height: 1.3;
        }
        .hint {
            font-size: 12px;
            color: #aa927c;
            background: #faf7f2;
            padding: 10px 14px;
            border-radius: 18px;
            margin-top: 16px;
        }
        .lang-name {
            text-align: right;
            font-size: 10px;
            color: #bcab99;
            margin-top: 14px;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Переводчик Seedance 2.0 (V1.1)</h1>
    <div class="sub">шуешьный язык / язык Seedance 2.0</div>

    <div class="input-group">
        <label>Слово или фраза</label>
        <input type="text" id="wordInput" placeholder="например: мама, шутишь, пельмени" autocomplete="off">
    </div>

    <div class="result">
        <div class="result-label">перевод</div>
        <div class="translation" id="translationOutput">напиши слово</div>
    </div>

    <div class="hint">
        примеры: мама, сестра, алгебра, хулиган, дневник
    </div>
    <div class="lang-name">
        шуешьный язык / язык Seedance 2.0
    </div>
</div>

<script>
    // ======================== ПОЛНЫЙ СЛОВАРЬ (русский -> шуешьный) ========================
    const simpleDict = {
        // Глаголы и неизменяемые (все формы, которые не склоняются)
        "шутишь": "шуешь",
        "шути": "шуй",
        "шучу": "шую",
        "шутите": "шуете",
        "забыл": "забубел",
        "забыла": "забубела",
        "заболел": "забубел",
        "заболела": "забубела",
        "дубай": "дибай",
        "купить": "купыть",
        "тяги": "носка",
        "обалдел": "оболыль",
        "обалдела": "оболыла",
        "привет": "привёт",
        "прилететь": "припритеть",
        "вальс": "валс",
        "громче": "громне",
        "издеваешься": "издевавыся",
        "уйди": "ухды",
        "спит": "спыт",
        "спать": "спыть",
        "8 марта": "баси марца",
        "восьмое марта": "баси марца",
        "скушала": "скушИла",
        "скушали": "скушИли",
        "скушать": "скушИть",
        "спрятал": "спритАл",
        "спрятала": "спритАла",
        "верни": "вернуй",
        "вернуть": "вернуй",
        "стоишь": "стай",
        "стоять": "стаять",
        "брал": "берил",
        "брала": "берила",
        "пошлите": "пощите",
        "попей": "полей",
        "скоро": "скуит",
        "вылезай": "вылясткик",
        "прогулы": "прогули",
        "выпьем": "выбудем",
        "родители": "родите",
        "пятого класса": "пятьего классо",
        "5-го класса": "пятьего классо",
        "разбогатела": "разволонила",
        "прогулять": "пропудять",
        "пельмени": "пыльманы",
        "мужчины": "мучели",
        "мужики": "мучели",
        "убийца": "уберин",  // добавлено
        "убийцу": "уберина",
        "убийцы": "уберины"
    };

    // ======================== СКЛОНЯЕМЫЕ СЛОВА (основа + перевод основы) ========================
    const declinable = {
        // Существительные женского рода на -а/-я
        "путёвк": { base: "пайтёвк" },
        "сестр": { base: "седр" },
        "алгебр": { base: "альгр" },
        "школ": { base: "кол" },
        "помад": { base: "помар" },
        "косметик": { base: "космет" },
        "аскорбинк": { base: "оскаринк" },
        "косметичк": { base: "космеечк" },
        "мам": { base: "мам" },   // мама -> мамо (основа мам, окончание о)
        "убийц": { base: "уберин" },
        // Существительные мужского рода (нулевое окончание)
        "пельмен": { base: "пыльман" },
        "бургер": { base: "бургер-быргер" },
        "дневник": { base: "дернярник" },
        "хулиган": { base: "банан" },
        "кошелёк": { base: "кошок" },
        "багет": { base: "багрэт" },
        "магазин": { base: "нарказин" },
        "угол": { base: "угуд" },
        "кинотеатр": { base: "кинема" },
        // Прилагательные
        "бархатн": { base: "бархлятн" },
        "крут": { base: "крутв" },
        "сладк": { base: "слад" },
        "нагл": { base: "губнячн" }
    };

    // Дополнительные точные совпадения для форм, которые не подходят под основы (например, "маму" -> "маму")
    // Добавим их в simpleDict
    simpleDict["маму"] = "маму";
    simpleDict["маме"] = "маме";
    simpleDict["мамой"] = "мамой";
    simpleDict["сестру"] = "седру";
    simpleDict["сестре"] = "седре";
    simpleDict["сестрой"] = "седрой";
    simpleDict["сестры"] = "седры";
    simpleDict["алгебру"] = "альгрию";
    simpleDict["алгебре"] = "альгрии";
    simpleDict["алгеброй"] = "альгрией";
    simpleDict["алгебры"] = "альгрии";
    simpleDict["школу"] = "колу";
    simpleDict["школе"] = "коле";
    simpleDict["школой"] = "колой";
    simpleDict["школы"] = "колы";
    simpleDict["помаду"] = "помару";
    simpleDict["помаде"] = "помаре";
    simpleDict["помадой"] = "помарай";
    simpleDict["помады"] = "помары";
    simpleDict["косметику"] = "косметию";
    simpleDict["косметике"] = "косметее";
    simpleDict["косметикой"] = "косметией";
    simpleDict["косметики"] = "косметии";
    simpleDict["аскорбинку"] = "оскаринку";
    simpleDict["аскорбинке"] = "оскаринке";
    simpleDict["аскорбинкой"] = "оскаринкой";
    simpleDict["аскорбинки"] = "оскаринки";
    simpleDict["косметичку"] = "космеечку";
    simpleDict["косметичке"] = "космеечке";
    simpleDict["косметичкой"] = "космеечкой";
    simpleDict["косметички"] = "космеечки";
    simpleDict["путёвку"] = "пайтёвку";
    simpleDict["путёвке"] = "пайтёвке";
    simpleDict["путёвкой"] = "пайтёвкой";
    simpleDict["путёвки"] = "пайтёвки";
    simpleDict["убийцу"] = "уберина";
    simpleDict["убийце"] = "уберине";
    simpleDict["убийцей"] = "убериной";
    simpleDict["убийцы"] = "уберины";
    simpleDict["пельменя"] = "пыльмана";
    simpleDict["пельменю"] = "пыльману";
    simpleDict["пельменем"] = "пыльманом";
    simpleDict["пельмене"] = "пыльмане";
    simpleDict["бургера"] = "бургер-быргера";
    simpleDict["бургеру"] = "бургер-быргеру";
    simpleDict["бургером"] = "бургер-быргером";
    simpleDict["бургере"] = "бургер-быргере";
    simpleDict["дневника"] = "дернярника";
    simpleDict["дневнику"] = "дернярнику";
    simpleDict["дневником"] = "дернярником";
    simpleDict["дневнике"] = "дернярнике";
    simpleDict["хулигана"] = "банана";
    simpleDict["хулигану"] = "банану";
    simpleDict["хулиганом"] = "бананом";
    simpleDict["хулигане"] = "банане";
    simpleDict["кошелька"] = "кошка";
    simpleDict["кошельку"] = "кошку";
    simpleDict["кошельком"] = "кошком";
    simpleDict["кошельке"] = "кошке";
    simpleDict["багета"] = "багрэта";
    simpleDict["багету"] = "багрэту";
    simpleDict["багетом"] = "багрэтом";
    simpleDict["багете"] = "багрэте";
    simpleDict["магазина"] = "нарказина";
    simpleDict["магазину"] = "нарказину";
    simpleDict["магазином"] = "нарказином";
    simpleDict["магазине"] = "нарказине";
    simpleDict["угла"] = "угуда";
    simpleDict["углу"] = "угуду";
    simpleDict["углом"] = "угудом";
    simpleDict["угле"] = "угуде";
    simpleDict["кинотеатра"] = "кинема";
    simpleDict["кинотеатру"] = "кинема";
    simpleDict["кинотеатром"] = "кинема";
    simpleDict["кинотеатре"] = "кинема";

    // Функция перевода слова (сначала точное совпадение, потом попытка через основу)
    function translateWord(word) {
        let lowerWord = word.toLowerCase();
        if (simpleDict[lowerWord]) return simpleDict[lowerWord];
        
        // Попытка склонения через основу
        for (let [stem, info] of Object.entries(declinable)) {
            if (lowerWord.startsWith(stem)) {
                let ending = lowerWord.slice(stem.length);
                if (ending.length <= 3) {
                    let transBase = info.base;
                    // Особое окончание для "мама" -> "мамо" (в именительном)
                    if (stem === "мам" && ending === "а") return "мамо";
                    if (stem === "мам" && ending === "у") return "маму";
                    if (stem === "мам" && ending === "е") return "маме";
                    if (stem === "мам" && ending === "ой") return "мамой";
                    if (stem === "мам" && ending === "ы") return "мамы";
                    // Общий случай
                    return transBase + ending;
                }
            }
        }
        return null;
    }

    function translatePhrase(phrase) {
        let words = phrase.split(/(\s+|[.,!?;:()"'])/);
        let result = [];
        for (let w of words) {
            if (/^[.,!?;:()"'\s]+$/.test(w)) {
                result.push(w);
            } else {
                let translation = translateWord(w);
                if (translation) {
                    if (w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase())
                        translation = translation[0].toUpperCase() + translation.slice(1);
                    result.push(translation);
                } else {
                    result.push(w);
                }
            }
        }
        return result.join('');
    }

    const input = document.getElementById('wordInput');
    const outputDiv = document.getElementById('translationOutput');
    function updateTranslation() {
        let rawText = input.value;
        if (rawText === "") {
            outputDiv.innerHTML = "напиши слово";
            return;
        }
        outputDiv.innerHTML = translatePhrase(rawText);
    }
    input.addEventListener('input', updateTranslation);
    updateTranslation();
</script>
</body>
</html>
